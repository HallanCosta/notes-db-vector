  # Ollama (LLM Server)
  ollama:
    image: ollama/ollama:latest
    container_name: notes-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./.docker/ollama_data:/root/.ollama
    restart: unless-stopped

    networks:
      - app-network

networks:
  app-network:
    driver: bridge
